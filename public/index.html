<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lapidary - Knowledge Graph Explorer</title>
  <meta name="description" content="Explore the Ruby community knowledge graph built from bugs.ruby-lang.org issue data. Discover relationships between Rubyists, core modules, and standard libraries.">
  <meta name="theme-color" content="#4F46E5">
  <!-- Open Graph -->
  <meta property="og:title" content="Lapidary - Knowledge Graph Explorer">
  <meta property="og:description" content="Explore the Ruby community knowledge graph built from bugs.ruby-lang.org issue data. Discover relationships between Rubyists, core modules, and standard libraries.">
  <meta property="og:type" content="website">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Lapidary - Knowledge Graph Explorer">
  <meta name="twitter:description" content="Explore the Ruby community knowledge graph built from bugs.ruby-lang.org issue data. Discover relationships between Rubyists, core modules, and standard libraries.">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="/style.css">
  <script type="importmap">
  {
    "imports": {
      "@hotwired/stimulus": "https://esm.sh/@hotwired/stimulus@3.2.2",
      "cytoscape": "https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.33.1/cytoscape.esm.min.mjs"
    }
  }
  </script>
  <script type="module" src="/controllers/application.js"></script>
</head>
<body class="h-screen flex flex-col bg-gray-50 text-gray-900">
  <!-- Header -->
  <header class="bg-white border-b border-gray-200 px-6 py-3 shrink-0">
    <h1 class="text-xl font-bold tracking-tight">Lapidary <span class="text-gray-400 font-normal text-sm">Knowledge Graph Explorer</span></h1>
  </header>

  <!-- Main layout -->
  <div class="flex flex-1 overflow-hidden"
       data-controller="search graph filter detail"
       data-action="search:node-selected->graph#loadNode filter:filter-changed->graph#applyFilters graph:node-detail->detail#showNode graph:edge-detail->detail#showEdge graph:clear-detail->detail#clear">

    <!-- Left Sidebar: Search + Filters -->
    <aside class="w-72 shrink-0 bg-white border-r border-gray-200 flex flex-col overflow-y-auto">
      <!-- Search Panel -->
      <div class="p-4 border-b border-gray-100">
        <h2 class="text-sm font-semibold text-gray-600 uppercase tracking-wide mb-3">Search Nodes</h2>
        <form data-action="submit->search#search" class="space-y-2">
          <select data-search-target="typeSelect"
                  class="w-full rounded border border-gray-300 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="">All Types</option>
            <option value="Rubyist">Rubyist</option>
            <option value="CoreModule">CoreModule</option>
            <option value="Stdlib">Stdlib</option>
          </select>
          <input type="text"
                 data-search-target="queryInput"
                 placeholder="Keyword..."
                 class="w-full rounded border border-gray-300 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <button type="submit"
                  data-search-target="submitButton"
                  class="w-full bg-indigo-600 text-white rounded px-3 py-1.5 text-sm font-medium hover:bg-indigo-700 transition disabled:opacity-50 disabled:cursor-not-allowed">
            Search
          </button>
        </form>
        <p data-search-target="status" class="text-xs mt-2"></p>
      </div>

      <!-- Results -->
      <div class="flex-1 overflow-y-auto">
        <ul data-search-target="resultsList" class="p-2 space-y-1"></ul>
        <div class="p-2 hidden" data-search-target="loadMoreButton">
          <button type="button"
                  data-search-target="loadMoreBtn"
                  data-action="click->search#loadMore"
                  class="w-full text-indigo-600 border border-indigo-300 rounded px-3 py-1.5 text-sm font-medium hover:bg-indigo-50 transition disabled:opacity-50 disabled:cursor-not-allowed">
            Load More
          </button>
        </div>
      </div>

      <!-- Filter Panel -->
      <div class="p-4 border-t border-gray-100">
        <h2 class="text-sm font-semibold text-gray-600 uppercase tracking-wide mb-3">Filters</h2>
        <div class="space-y-2">
          <label class="block">
            <span class="text-xs text-gray-500">Direction</span>
            <select data-filter-target="directionSelect"
                    data-action="change->filter#apply"
                    class="w-full rounded border border-gray-300 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
              <option value="both">Both</option>
              <option value="outbound">Outbound</option>
              <option value="inbound">Inbound</option>
            </select>
          </label>
          <label class="block">
            <span class="text-xs text-gray-500">Observed After</span>
            <input type="date"
                   data-filter-target="observedAfter"
                   data-action="change->filter#apply"
                   class="w-full rounded border border-gray-300 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
          </label>
          <label class="block">
            <span class="text-xs text-gray-500">Observed Before</span>
            <input type="date"
                   data-filter-target="observedBefore"
                   data-action="change->filter#apply"
                   class="w-full rounded border border-gray-300 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
          </label>
          <label class="flex items-center gap-2 pt-1">
            <input type="checkbox"
                   data-filter-target="includeArchived"
                   data-action="change->filter#apply"
                   class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
            <span class="text-xs text-gray-500">Show archived edges</span>
          </label>
        </div>
      </div>
    </aside>

    <!-- Center: Graph -->
    <main class="flex-1 min-w-0 relative">
      <div data-graph-target="canvas" id="cy" class="w-full h-full bg-gray-50"></div>
      <!-- Loading Overlay -->
      <div data-graph-target="overlay"
           class="absolute inset-0 bg-white/80 backdrop-blur-sm flex items-center justify-center z-10 hidden"
           aria-busy="false">
        <div class="flex flex-col items-center gap-2">
          <svg class="animate-spin h-8 w-8 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          <span class="text-sm font-medium text-gray-600">Loading graph...</span>
        </div>
      </div>
      <!-- Legend -->
      <div class="absolute bottom-4 left-4 bg-white/90 border border-gray-200 rounded-lg px-3 py-2 text-xs space-y-1.5">
        <div class="font-semibold text-gray-500 mb-1">Legend</div>
        <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-[#3B82F6]"></span> Rubyist</div>
        <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-[#10B981]"></span> CoreModule</div>
        <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-[#F59E0B]"></span> Stdlib</div>
        <div class="border-t border-gray-200 my-1"></div>
        <div class="flex items-center gap-2"><span class="w-5 border-t-2 border-[#6366F1]"></span> Maintenance</div>
        <div class="flex items-center gap-2"><span class="w-5 border-t-2 border-dashed border-[#F97316]"></span> Contribute</div>
      </div>
    </main>

    <!-- Right Sidebar: Detail Panel -->
    <aside class="w-72 shrink-0 bg-white border-l border-gray-200 overflow-y-auto p-4 min-w-0 break-words">
      <h2 class="text-sm font-semibold text-gray-600 uppercase tracking-wide mb-3">Details</h2>
      <div data-detail-target="content"></div>
    </aside>
  </div>
</body>
</html>
